<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест: Клиповое мышление у подростков</title>
    <!-- 1. Загружаем основные стили jsPsych -->
    <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet" type="text/css" />
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .jspsych-content { max-width: 900px; margin: 0 auto; background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        button { background-color: #4a6fa5; border: none; color: white; padding: 12px 24px; font-size: 1rem; border-radius: 40px; cursor: pointer; }
        button:hover { background-color: #2c4c7a; }
        .result-section { margin: 1rem 0; padding: 1rem; background: #e9ecef; border-radius: 12px; }
        .alert { background: #fff3cd; border-left: 5px solid #ffc107; padding: 1rem; margin: 1rem 0; border-radius: 8px; }
    </style>
</head>
<body>
<div id="jspsych-target"></div>

<!-- 2. Загружаем саму библиотеку jsPsych (CORE) -->
<script src="https://unpkg.com/jspsych@7.3.4"></script>

<!-- 3. Загружаем необходимые плагины (каждый плагин - отдельный файл) -->
<script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
<script src="https://unpkg.com/@jspsych/plugin-survey-likert@1.1.3"></script>
<script src="https://unpkg.com/@jspsych/plugin-survey-html-form@1.0.0"></script>

<script>
    // ----- Инициализация jsPsych и создание timeline -----
    const jsPsych = initJsPsych(); // <--- КЛЮЧЕВОЙ МОМЕНТ

    let timeline = [];

    // ---- Вопросы для блоков ----
    // ... (весь массив вопросов такой же, как в предыдущем коде) ...
    const likertQuestions = [
        "Когда я читаю длинный текст (больше двух страниц), мне трудно сосредоточиться, я быстро отвлекаюсь.",
        "Я предпочитаю короткие видео (до 1 минуты) вместо фильмов или лекций.",
        "Мне легко переключаться между несколькими делами одновременно (например, слушать музыку, делать уроки и переписываться в чате).",
        "Я часто теряю нить разговора или смысла сообщения, потому что мысли перескакивают с одного на другое.",
        "Чтобы запомнить информацию, мне нужны яркие картинки, а не текст.",
        "Мне трудно развёрнуто ответить на вопрос — я предпочитаю отвечать \"да\", \"нет\" или одним словом.",
        "Я воспринимаю информацию отдельными кусками, не пытаясь соединить их в общую картину.",
        "Когда я узнаю новость, меня обычно не волнует, что было до этого или что будет после — главное, что происходит сейчас.",
        "Для меня не важно, *почему* что-то произошло — достаточно знать, *что* произошло.",
        "Когда я читаю текст или слушаю объяснение, я легко удерживаю в голове главную мысль и вижу, как детали к ней относятся.",
        "Я могу посмотреть одно короткое видео на тему и считать, что я в ней разобрался, не проверяя другие источники.",
        "Мне трудно объяснить процесс или событие от начала до конца — я помню только отдельные моменты."
    ];
    const likertLabels = ["1 - совсем не похоже", "2 - скорее не похоже", "3 - иногда похоже", "4 - часто похоже", "5 - почти всегда похоже"];

    const nrsQuestions = [
        "Насколько сильно тебя привлекает бесконечная лента коротких роликов (TikTok, Reels, YouTube Shorts)? (0-10)",
        "Как часто после чтения поста или новости ты можешь пересказать только отдельные фразы, но не общий смысл? (0-10)",
        "Насколько для тебя важно получать лайки, комментарии или быстрый отклик на свои публикации? (0-10)",
        "Когда я что-то не помню, я сразу лезу в телефон и ищу, даже не пытаясь вспомнить сам. (0-10)",
        "Мне комфортно получать информацию из 5-6 разных источников одновременно (0-10)"
    ];

    const postmodernItems = [
        { name: "Фрагментация", textFreq: "Как часто в твоей ленте попадаются несвязанные отрывки на одну тему? (0-10)", textLike: "Насколько тебе нравится такой формат? (0-10)" },
        { name: "Эклектизм", textFreq: "Как часто ты видишь смешение разных стилей, жанров, эпох в одном видео/посте? (0-10)", textLike: "Насколько это тебе нравится? (0-10)" },
        { name: "Презентизм", textFreq: "Как часто ты смотришь видео или читаешь посты без связи с прошлым или будущим (чистый тренд)? (0-10)", textLike: "Насколько это тебе нравится? (0-10)" },
        { name: "Интертекстуальность", textFreq: "Как часто ты встречаешь шутки, понятные только если знать предыдущие мемы/видео? (0-10)", textLike: "Насколько тебе нравится их разгадывать? (0-10)" }
    ];

    const flagQuestions = [
        "Мне трудно сосредоточиться, даже когда хочется. Это было со мной с детства (до 12 лет). (0-10)",
        "Я часто действую импульсивно, не подумав (выкрикиваю, перебиваю, делаю необдуманные поступки). (0-10)",
        "Я постоянно беспокоюсь о будущем даже без реальной причины. (0-10)",
        "У меня бывают приступы паники, сильное сердцебиение, потливость. (0-10)",
        "Последние недели чувствую постоянную усталость, ничего не хочется, ранее любимое не радует. (0-10)",
        "Мой сон и аппетит сильно изменились. (0-10)",
        "Я очень чувствителен к громким звукам, яркому свету, сильным запахам, и это меня перегружает. (0-10)",
        "У меня бывают периоды (несколько дней), когда энергия зашкаливает, почти не сплю, строю грандиозные планы. (0-10)",
        "У меня часто меняется настроение от очень активного до подавленного без явной причины. (0-10)",
        "Когда я злюсь, могу сказать или сделать то, о чём потом жалею (вспыльчивость). (0-10)"
    ];

    // ----- Функция для отображения результатов -----
    function computeAndShowResults() {
        const trials = jsPsych.data.get().trials;
        let likertResp = [], nrsResp = {}, distResp = {}, pmResp = {}, flagResp = {};
        for (let t of trials) {
            if (t.phase === "likert" && t.response) likertResp = Object.values(t.response).map(v => parseInt(v));
            if (t.phase === "nrs") nrsResp = t.response || {};
            if (t.phase === "distribution") distResp = t.response || {};
            if (t.phase === "postmodern") pmResp = t.response || {};
            if (t.phase === "flags") flagResp = t.response || {};
        }
        // ИКМ расчёт
        let likertSum = 0, maxLikert = 12*5;
        if (likertResp.length === 12) {
            let rev = [...likertResp];
            rev[9] = 6 - rev[9];
            likertSum = rev.reduce((a,b)=>a+b,0);
        }
        let ikm_a1 = (likertSum / maxLikert) * 100;
        let nrsSum = 0;
        for (let i=0; i<5; i++) nrsSum += parseInt(nrsResp[`nrs_${i}`]) || 0;
        let ikm_a2 = (nrsSum / 50) * 100;
        let clipDist = parseInt(distResp.clip) || 50;
        let ikm_a3 = clipDist;
        let ikm = 0.5*ikm_a1 + 0.3*ikm_a2 + 0.2*ikm_a3;

        // Постмодерн баллы
        let pmScores = [];
        for (let i=0; i<4; i++) {
            let freq = parseInt(pmResp[`pm_freq_${i}`]) || 0;
            let like = parseInt(pmResp[`pm_like_${i}`]) || 0;
            pmScores.push((freq+like)/2);
        }

        // Флажки
        let flagVals = [];
        for (let i=0; i<10; i++) flagVals.push(parseInt(flagResp[`flag_${i}`]) || 0);
        const adhd = (flagVals[0] + flagVals[1]) / 20 * 100;
        const anxiety = (flagVals[2] + flagVals[3]) / 20 * 100;
        const depression = (flagVals[4] + flagVals[5]) / 20 * 100;
        const sensitivity = (flagVals[6]) / 10 * 100;
        const bipolar = (flagVals[7]) / 10 * 100;
        const emotional = (flagVals[8] + flagVals[9]) / 20 * 100;
        let warnings = [];
        if (adhd >= 70) warnings.push("СДВГ");
        if (anxiety >= 70) warnings.push("тревожное расстройство");
        if (depression >= 70) warnings.push("депрессия/апатия");
        if (sensitivity >= 70) warnings.push("высокая сенсорная чувствительность");
        if (bipolar >= 70) warnings.push("биполярно-аффективное расстройство");
        if (emotional >= 70) warnings.push("эмоциональная нестабильность/холерический темперамент");

        let level = "";
        if (ikm <= 25) level = "Низкий (целостное мышление)";
        else if (ikm <= 50) level = "Умеренный (смешанный стиль)";
        else if (ikm <= 75) level = "Высокий (выраженное клиповое мышление)";
        else level = "Очень высокий";

        let resultHtml = `<div><h2>Результаты теста</h2>
            <div class="result-section"><h3>Индекс клипового мышления: ${ikm.toFixed(1)} из 100</h3><p>Уровень: ${level}</p></div>
            <div class="result-section"><h3>Постмодернистские форматы (0-10)</h3>
            <ul><li><strong>Фрагментация:</strong> ${pmScores[0].toFixed(1)}</li><li><strong>Эклектизм:</strong> ${pmScores[1].toFixed(1)}</li><li><strong>Презентизм:</strong> ${pmScores[2].toFixed(1)}</li><li><strong>Интертекстуальность:</strong> ${pmScores[3].toFixed(1)}</li></ul></div>`;
        if (warnings.length > 0) {
            resultHtml += `<div class="alert"><strong>Внимание!</strong> Признаки: ${warnings.join(", ")}. Рекомендуется консультация специалиста.</div>`;
        } else {
            resultHtml += `<div class="alert" style="background:#d4edda;border-left-color:#28a745;">По дополнительным вопросам не выявлено выраженных признаков клинических состояний.</div>`;
        }
        resultHtml += `<button id="restartBtn" style="display:block; margin:20px auto;">Пройти заново</button></div>`;
        document.getElementById("jspsych-target").innerHTML = resultHtml;
        document.getElementById("restartBtn").addEventListener("click", () => location.reload());
    }

    // ----- ДОБАВЛЯЕМ ВСЕ БЛОКИ В TIMELINE -----
    // Приветствие
    timeline.push({
        type: jsPsychHtmlKeyboardResponse,
        stimulus: '<div style="text-align:center;"><h2>Тест: Клиповое мышление у подростков</h2><p>Этот тест поможет понять, как ты воспринимаешь информацию.</p><p>Нет правильных или неправильных ответов — отвечай честно.</p><p>Нажми любую клавишу для продолжения.</p></div>'
    });

    // Демография
    timeline.push({
        type: jsPsychSurveyHtmlForm,
        html: '<h2>Несколько вопросов о вас</h2><div><label>Возраст: <input type="number" name="age" min="14" max="19" required></label></div><div><label>Пол: <select name="gender"><option>М</option><option>Ж</option><option>Другое</option></select></label></div><div><label>Как часто пользуешься интернетом? <select name="internet_freq"><option>Несколько раз в неделю</option><option>1-2 часа в день</option><option>3-5 часов в день</option><option>6-8 часов в день</option><option>Более 8 часов в день</option></select></label></div>',
        button_label: "Далее",
        data: { phase: "demographics" }
    });

    // Likert
    timeline.push({
        type: jsPsychSurveyLikert,
        questions: likertQuestions.map(q => ({ prompt: q, labels: likertLabels, required: true })),
        preamble: "<h2>Блок А1. Твой стиль мышления</h2>",
        data: { phase: "likert" }
    });

    // NRS блок А2
    let nrsHtml = '<h2>Блок А2. Оцени по шкале 0-10</h2>';
    for (let i = 0; i < nrsQuestions.length; i++) {
        nrsHtml += `<div style="margin-bottom:20px;"><label><strong>${nrsQuestions[i]}</strong></label><br>
            <input type="range" name="nrs_${i}" min="0" max="10" step="1" value="5" oninput="this.nextElementSibling.value=this.value">
            <output>5</output></div>`;
    }
    timeline.push({
        type: jsPsychSurveyHtmlForm,
        html: nrsHtml,
        button_label: "Далее",
        data: { phase: "nrs" }
    });

    // Распределение 100 баллов
    timeline.push({
        type: jsPsychSurveyHtmlForm,
        html: '<h2>Блок А3. Распределение 100 баллов</h2><div><label>На фрагментарное, быстрое, "клиповое": <input type="number" name="clip" min="0" max="100" value="50" required></label></div><div><label>На последовательное, целостное: <input type="number" name="holistic" min="0" max="100" value="50" required></label></div><p>Сумма должна быть 100.</p>',
        button_label: "Далее",
        on_finish: (data) => {
            let clip = parseInt(data.response.clip) || 50;
            let hol = parseInt(data.response.holistic) || 50;
            if (clip + hol !== 100) {
                alert("Сумма не равна 100. Будет использовано среднее значение 50/50.");
                data.response.clip = 50;
                data.response.holistic = 50;
            }
        },
        data: { phase: "distribution" }
    });

    // Постмодернизм
    let pmHtml = '<h2>Блок Б. Влияние соцсетей</h2>';
    for (let i = 0; i < postmodernItems.length; i++) {
        pmHtml += `<h3>${postmodernItems[i].name}</h3>
            <div><strong>${postmodernItems[i].textFreq}</strong><br>
            <input type="range" name="pm_freq_${i}" min="0" max="10" step="1" value="5" oninput="this.nextElementSibling.value=this.value"><output>5</output></div>
            <div><strong>${postmodernItems[i].textLike}</strong><br>
            <input type="range" name="pm_like_${i}" min="0" max="10" step="1" value="5" oninput="this.nextElementSibling.value=this.value"><output>5</output></div>`;
    }
    timeline.push({
        type: jsPsychSurveyHtmlForm,
        html: pmHtml,
        button_label: "Далее",
        data: { phase: "postmodern" }
    });

    // Флажковый блок
    let flagHtml = '<h2>Блок В. Несколько вопросов о самочувствии</h2>';
    for (let i = 0; i < flagQuestions.length; i++) {
        flagHtml += `<div style="margin-bottom:20px;"><strong>${flagQuestions[i]}</strong><br>
            <input type="range" name="flag_${i}" min="0" max="10" step="1" value="0" oninput="this.nextElementSibling.value=this.value">
            <output>0</output></div>`;
    }
    timeline.push({
        type: jsPsychSurveyHtmlForm,
        html: flagHtml,
        button_label: "Завершить тест",
        data: { phase: "flags" },
        on_finish: () => computeAndShowResults()
    });

    // Запуск теста
    jsPsych.run(timeline);
</script>
</body>
</html>
