<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Тест: Клиповое мышление у подростков</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            margin: 0;
            padding: 20px;
        }
        .test-container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .progress-wrapper {
            margin-bottom: 25px;
            padding-bottom: 10px;
            border-bottom: 1px solid #e0e0e0;
        }
        .progress-text {
            font-size: 0.9rem;
            color: #2c4c7a;
            margin-bottom: 8px;
            text-align: center;
        }
        .progress-bar-container {
            background-color: #e0e0e0;
            border-radius: 20px;
            height: 12px;
            width: 100%;
            overflow: hidden;
        }
        .progress-bar-fill {
            background-color: #4a6fa5;
            height: 100%;
            width: 0%;
            border-radius: 20px;
            transition: width 0.3s ease;
        }
        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }
        button, .btn-link {
            background-color: #4a6fa5;
            border: none;
            color: white;
            padding: 12px 28px;
            font-size: 1rem;
            border-radius: 40px;
            cursor: pointer;
            transition: background 0.2s;
            text-decoration: none;
            display: inline-block;
            font-family: inherit;
        }
        button:hover, .btn-link:hover {
            background-color: #2c4c7a;
        }
        button:disabled {
            background-color: #a0b8d0;
            cursor: not-allowed;
        }
        .result-section {
            margin: 1rem 0;
            padding: 1rem;
            background: #e9ecef;
            border-radius: 12px;
        }
        .alert {
            background: #fff3cd;
            border-left: 5px solid #ffc107;
            padding: 1rem;
            margin: 1rem 0;
            border-radius: 8px;
        }
        .question-group {
            margin-bottom: 20px;
        }
        .likert-options {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 8px;
        }
        .likert-options label {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 0.85rem;
        }
        h2, h3 {
            color: #1e3c5c;
        }
        input[type="range"] {
            width: 100%;
            max-width: 400px;
        }
        .error {
            color: red;
            font-size: 0.8rem;
            margin-top: 5px;
        }
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
<div id="test-root" class="test-container"></div>

<script>
    // ---------- Данные вопросов ----------
    const likertQuestions = [
        "Когда я читаю длинный текст (больше двух страниц), мне трудно сосредоточиться, я быстро отвлекаюсь.",
        "Я предпочитаю короткие видео (до 1 минуты) вместо фильмов или лекций.",
        "Мне легко переключаться между несколькими делами одновременно (например, слушать музыку, делать уроки и переписываться в чате).",
        "Я часто теряю нить разговора или смысла сообщения, потому что мысли перескакивают с одного на другое.",
        "Чтобы запомнить информацию, мне нужны яркие картинки, а не текст.",
        "Мне трудно развёрнуто ответить на вопрос — я предпочитаю отвечать \"да\", \"нет\" или одним словом.",
        "Я воспринимаю информацию отдельными кусками, не пытаясь соединить их в общую картину.",
        "Когда я узнаю новость, меня обычно не волнует, что было до этого или что будет после — главное, что происходит сейчас.",
        "Для меня не важно, *почему* что-то произошло — достаточно знать, *что* произошло.",
        "Когда я читаю текст или слушаю объяснение, я легко удерживаю в голове главную мысль и вижу, как детали к ней относятся.",
        "Я могу посмотреть одно короткое видео на тему и считать, что я в ней разобрался, не проверяя другие источники.",
        "Мне трудно объяснить процесс или событие от начала до конца — я помню только отдельные моменты."
    ];
    const likertLabels = ["1 - совсем не похоже", "2 - скорее не похоже", "3 - иногда похоже", "4 - часто похоже", "5 - почти всегда похоже"];

    const nrsQuestions = [
        "Насколько сильно тебя привлекает бесконечная лента коротких роликов (TikTok, Reels, YouTube Shorts)? (0-10)",
        "Как часто после чтения поста или новости ты можешь пересказать только отдельные фразы, но не общий смысл? (0-10)",
        "Насколько для тебя важно получать лайки, комментарии или быстрый отклик на свои публикации? (0-10)",
        "Когда я что-то не помню, я сразу лезу в телефон и ищу, даже не пытаясь вспомнить сам. (0-10)",
        "Мне комфортно получать информацию из 5-6 разных источников одновременно (0-10)"
    ];

    const postmodernItems = [
        { name: "Фрагментация", textFreq: "Как часто в твоей ленте попадаются несвязанные отрывки на одну тему? (0-10)", textLike: "Насколько тебе нравится такой формат? (0-10)" },
        { name: "Эклектизм", textFreq: "Как часто ты видишь смешение разных стилей, жанров, эпох в одном видео/посте? (0-10)", textLike: "Насколько это тебе нравится? (0-10)" },
        { name: "Презентизм", textFreq: "Как часто ты смотришь видео или читаешь посты без связи с прошлым или будущим (чистый тренд)? (0-10)", textLike: "Насколько это тебе нравится? (0-10)" },
        { name: "Интертекстуальность", textFreq: "Как часто ты встречаешь шутки, понятные только если знать предыдущие мемы/видео? (0-10)", textLike: "Насколько тебе нравится их разгадывать? (0-10)" }
    ];

    const flagQuestions = [
        "Мне трудно сосредоточиться, даже когда хочется. Это было со мной с детства (до 12 лет). (0-10)",
        "Я часто действую импульсивно, не подумав (выкрикиваю, перебиваю, делаю необдуманные поступки). (0-10)",
        "Я постоянно беспокоюсь о будущем даже без реальной причины. (0-10)",
        "У меня бывают приступы паники, сильное сердцебиение, потливость. (0-10)",
        "Последние недели чувствую постоянную усталость, ничего не хочется, ранее любимое не радует. (0-10)",
        "Мой сон и аппетит сильно изменились. (0-10)",
        "Я очень чувствителен к громким звукам, яркому свету, сильным запахам, и это меня перегружает. (0-10)",
        "У меня бывают периоды (несколько дней), когда энергия зашкаливает, почти не сплю, строю грандиозные планы. (0-10)",
        "У меня часто меняется настроение от очень активного до подавленного без явной причины. (0-10)",
        "Когда я злюсь, могу сказать или сделать то, о чём потом жалею (вспыльчивость). (0-10)"
    ];

    // ---------- Состояние теста ----------
    let pages = [
        { id: "welcome", title: "Добро пожаловать", render: renderWelcome },
        { id: "demographics", title: "О вас", render: renderDemographics },
        { id: "likert", title: "Блок А1", render: renderLikert },
        { id: "nrs", title: "Блок А2", render: renderNRS },
        { id: "distribution", title: "Блок А3", render: renderDistribution },
        { id: "postmodern", title: "Блок Б", render: renderPostmodern },
        { id: "flags", title: "Блок В", render: renderFlags }
    ];
    let currentPage = 0;
    let answers = {};

    // ---------- Функции рендеринга страниц ----------
    function renderWelcome() {
        return `
            <div style="text-align:center;">
                <h2>Тест: Клиповое мышление у подростков</h2>
                <p>Этот тест поможет понять, как ты воспринимаешь информацию.</p>
                <p>Нет правильных или неправильных ответов — отвечай честно.</p>
                <p>Используйте кнопки <strong>«Назад»</strong> и <strong>«Далее»</strong> для навигации.</p>
            </div>
        `;
    }

    function renderDemographics() {
        let saved = answers.demographics || {};
        return `
            <h2>Несколько вопросов о вас</h2>
            <div class="question-group">
                <label>Возраст: <input type="number" id="age" min="14" max="19" value="${saved.age || ''}" required></label>
            </div>
            <div class="question-group">
                <label>Как часто пользуешься интернетом?
                    <select id="internet_freq" required>
                        <option value="">Выберите...</option>
                        <option ${saved.internet_freq === "Несколько раз в неделю" ? "selected" : ""}>Несколько раз в неделю</option>
                        <option ${saved.internet_freq === "1-2 часа в день" ? "selected" : ""}>1-2 часа в день</option>
                        <option ${saved.internet_freq === "3-5 часов в день" ? "selected" : ""}>3-5 часов в день</option>
                        <option ${saved.internet_freq === "6-8 часов в день" ? "selected" : ""}>6-8 часов в день</option>
                        <option ${saved.internet_freq === "Более 8 часов в день" ? "selected" : ""}>Более 8 часов в день</option>
                    </select>
                </label>
            </div>
        `;
    }

    function renderLikert() {
        let saved = answers.likert || {};
        let html = '<h2>Блок А1. Твой стиль мышления</h2><p>Оцени, насколько каждое утверждение похоже на тебя (1–5).</p>';
        for (let i = 0; i < likertQuestions.length; i++) {
            html += `<div class="question-group"><strong>${likertQuestions[i]}</strong><div class="likert-options">`;
            for (let j = 0; j < likertLabels.length; j++) {
                let val = j+1;
                let checked = (saved[`likert_${i}`] == val) ? 'checked' : '';
                html += `<label><input type="radio" name="likert_${i}" value="${val}" ${checked} required> ${likertLabels[j]}</label>`;
            }
            html += `</div></div>`;
        }
        return html;
    }

    function renderNRS() {
        let saved = answers.nrs || {};
        let html = '<h2>Блок А2. Оцени по шкале 0-10</h2>';
        for (let i = 0; i < nrsQuestions.length; i++) {
            let val = saved[`nrs_${i}`] !== undefined ? saved[`nrs_${i}`] : 5;
            html += `<div class="question-group">
                        <label><strong>${nrsQuestions[i]}</strong></label><br>
                        <input type="range" id="nrs_${i}" min="0" max="10" step="1" value="${val}" oninput="this.nextElementSibling.value=this.value">
                        <output>${val}</output>
                      </div>`;
        }
        return html;
    }

    function renderDistribution() {
        let saved = answers.distribution || {};
        let clipVal = saved.clip !== undefined ? saved.clip : 50;
        let holVal = saved.holistic !== undefined ? saved.holistic : 50;
        return `
            <h2>Блок А3. Распределение 100 баллов</h2>
            <div class="question-group">
                <label>На фрагментарное, быстрое, "клиповое": 
                    <input type="number" id="clip" min="0" max="100" value="${clipVal}" required>
                </label>
            </div>
            <div class="question-group">
                <label>На последовательное, целостное: 
                    <input type="number" id="holistic" min="0" max="100" value="${holVal}" required>
                </label>
            </div>
            <p>Сумма должна быть 100.</p>
            <div id="distr-error" class="error"></div>
        `;
    }

    function renderPostmodern() {
        let saved = answers.postmodern || {};
        let html = '<h2>Блок Б. Влияние соцсетей</h2><p>Оцени частоту и насколько нравится (0-10)</p>';
        for (let i = 0; i < postmodernItems.length; i++) {
            let freqVal = saved[`pm_freq_${i}`] !== undefined ? saved[`pm_freq_${i}`] : 5;
            let likeVal = saved[`pm_like_${i}`] !== undefined ? saved[`pm_like_${i}`] : 5;
            html += `<h3>${postmodernItems[i].name}</h3>
                <div class="question-group"><strong>${postmodernItems[i].textFreq}</strong><br>
                    <input type="range" id="pm_freq_${i}" min="0" max="10" step="1" value="${freqVal}" oninput="this.nextElementSibling.value=this.value">
                    <output>${freqVal}</output>
                </div>
                <div class="question-group"><strong>${postmodernItems[i].textLike}</strong><br>
                    <input type="range" id="pm_like_${i}" min="0" max="10" step="1" value="${likeVal}" oninput="this.nextElementSibling.value=this.value">
                    <output>${likeVal}</output>
                </div>`;
        }
        return html;
    }

    function renderFlags() {
        let saved = answers.flags || {};
        let html = '<h2>Блок В. Несколько вопросов о самочувствии</h2><p>Оцени, насколько верно для тебя за последние недели (0-10)</p>';
        for (let i = 0; i < flagQuestions.length; i++) {
            let val = saved[`flag_${i}`] !== undefined ? saved[`flag_${i}`] : 0;
            html += `<div class="question-group">
                        <strong>${flagQuestions[i]}</strong><br>
                        <input type="range" id="flag_${i}" min="0" max="10" step="1" value="${val}" oninput="this.nextElementSibling.value=this.value">
                        <output>${val}</output>
                    </div>`;
        }
        return html;
    }

    // ---------- Сохранение данных текущей страницы ----------
    function saveCurrentPage() {
        const pageId = pages[currentPage].id;
        if (pageId === 'welcome') return true;

        if (pageId === 'demographics') {
            const age = document.getElementById('age')?.value;
            const freq = document.getElementById('internet_freq')?.value;
            if (!age || !freq) return false;
            answers.demographics = { age, internet_freq: freq };
            return true;
        }
        if (pageId === 'likert') {
            let allChecked = true;
            for (let i = 0; i < likertQuestions.length; i++) {
                const selected = document.querySelector(`input[name="likert_${i}"]:checked`);
                if (!selected) { allChecked = false; break; }
                answers.likert = answers.likert || {};
                answers.likert[`likert_${i}`] = selected.value;
            }
            return allChecked;
        }
        if (pageId === 'nrs') {
            let nrs = {};
            for (let i = 0; i < nrsQuestions.length; i++) {
                const el = document.getElementById(`nrs_${i}`);
                if (el) nrs[`nrs_${i}`] = el.value;
            }
            answers.nrs = nrs;
            return true;
        }
        if (pageId === 'distribution') {
            const clip = document.getElementById('clip')?.value;
            const hol = document.getElementById('holistic')?.value;
            if (!clip || !hol) return false;
            if (parseInt(clip) + parseInt(hol) !== 100) {
                document.getElementById('distr-error').innerText = 'Сумма должна быть равна 100!';
                return false;
            }
            answers.distribution = { clip, holistic: hol };
            return true;
        }
        if (pageId === 'postmodern') {
            let pm = {};
            for (let i = 0; i < postmodernItems.length; i++) {
                const freqEl = document.getElementById(`pm_freq_${i}`);
                const likeEl = document.getElementById(`pm_like_${i}`);
                if (freqEl) pm[`pm_freq_${i}`] = freqEl.value;
                if (likeEl) pm[`pm_like_${i}`] = likeEl.value;
            }
            answers.postmodern = pm;
            return true;
        }
        if (pageId === 'flags') {
            let flags = {};
            for (let i = 0; i < flagQuestions.length; i++) {
                const el = document.getElementById(`flag_${i}`);
                if (el) flags[`flag_${i}`] = el.value;
            }
            answers.flags = flags;
            return true;
        }
        return true;
    }

    // ---------- Рендер текущей страницы с прогрессом ----------
    function renderCurrentPage() {
        const container = document.getElementById('test-root');
        const page = pages[currentPage];
        const content = page.render();
        const totalPages = pages.length;
        const currentNumber = currentPage + 1;
        const percent = (currentNumber / totalPages) * 100;

        const progressHtml = `
            <div class="progress-wrapper">
                <div class="progress-text">Страница ${currentNumber} из ${totalPages}</div>
                <div class="progress-bar-container">
                    <div class="progress-bar-fill" style="width: ${percent}%;"></div>
                </div>
            </div>
        `;

        const prevDisabled = currentPage === 0 ? 'disabled' : '';
        const nextLabel = currentPage === totalPages-1 ? 'Завершить тест' : 'Далее →';

        container.innerHTML = `
            ${progressHtml}
            ${content}
            <div class="nav-buttons">
                <button id="prevBtn" ${prevDisabled}>← Назад</button>
                <button id="nextBtn">${nextLabel}</button>
            </div>
        `;

        document.getElementById('prevBtn').addEventListener('click', () => {
            if (currentPage > 0) {
                if (saveCurrentPage()) {
                    currentPage--;
                    renderCurrentPage();
                } else {
                    alert('Пожалуйста, заполните все поля на текущей странице перед переходом назад.');
                }
            }
        });

        document.getElementById('nextBtn').addEventListener('click', () => {
            if (saveCurrentPage()) {
                if (currentPage === totalPages-1) {
                    showResults();
                } else {
                    currentPage++;
                    renderCurrentPage();
                }
            } else {
                alert('Пожалуйста, заполните все поля на этой странице.');
            }
        });
    }

    // ---------- Расчёт и вывод результатов с кнопкой "Рекомендации" (без параметра) ----------
    function showResults() {
        const likertResp = answers.likert ? Object.values(answers.likert).map(v => parseInt(v)) : [];
        const nrsResp = answers.nrs || {};
        const distResp = answers.distribution || {};
        const pmResp = answers.postmodern || {};
        const flagResp = answers.flags || {};

        let likertSum = 0, maxLikert = 12*5;
        if (likertResp.length === 12) {
            let rev = [...likertResp];
            rev[9] = 6 - rev[9];
            likertSum = rev.reduce((a,b)=>a+b,0);
        }
        let ikm_a1 = (likertSum / maxLikert) * 100;
        let nrsSum = 0;
        for (let i=0; i<5; i++) nrsSum += parseInt(nrsResp[`nrs_${i}`]) || 0;
        let ikm_a2 = (nrsSum / 50) * 100;
        let clipDist = parseInt(distResp.clip) || 50;
        let ikm_a3 = clipDist;
        let ikm = 0.5*ikm_a1 + 0.3*ikm_a2 + 0.2*ikm_a3;

        let pmScores = [];
        for (let i=0; i<4; i++) {
            let freq = parseInt(pmResp[`pm_freq_${i}`]) || 0;
            let like = parseInt(pmResp[`pm_like_${i}`]) || 0;
            pmScores.push((freq+like)/2);
        }

        let flagVals = [];
        for (let i=0; i<10; i++) flagVals.push(parseInt(flagResp[`flag_${i}`]) || 0);
        const adhd = (flagVals[0] + flagVals[1]) / 20 * 100;
        const anxiety = (flagVals[2] + flagVals[3]) / 20 * 100;
        const depression = (flagVals[4] + flagVals[5]) / 20 * 100;
        const sensitivity = (flagVals[6]) / 10 * 100;
        const bipolar = (flagVals[7]) / 10 * 100;
        const emotional = (flagVals[8] + flagVals[9]) / 20 * 100;
        let warnings = [];
        if (adhd >= 70) warnings.push("СДВГ");
        if (anxiety >= 70) warnings.push("тревожное расстройство");
        if (depression >= 70) warnings.push("депрессия/апатия");
        if (sensitivity >= 70) warnings.push("высокая сенсорная чувствительность");
        if (bipolar >= 70) warnings.push("биполярно-аффективное расстройство");
        if (emotional >= 70) warnings.push("эмоциональная нестабильность/холерический темперамент");

        let level = "";
        if (ikm <= 25) level = "Низкий (целостное мышление)";
        else if (ikm <= 50) level = "Умеренный (смешанный стиль)";
        else if (ikm <= 75) level = "Высокий (выраженное клиповое мышление)";
        else level = "Очень высокий";

        // Ссылка без параметра
        const recommendationsUrl = "https://clipdecode.tilda.ws/recommendations/";

        let resultHtml = `<div style="text-align:center;"><h2>Результаты теста</h2>
            <div class="result-section"><h3>Индекс клипового мышления: ${ikm.toFixed(1)} из 100</h3><p>Уровень: ${level}</p></div>
            <div class="result-section"><h3>Постмодернистские форматы (0-10)</h3>
            <ul><li><strong>Фрагментация:</strong> ${pmScores[0].toFixed(1)}</li><li><strong>Эклектизм:</strong> ${pmScores[1].toFixed(1)}</li><li><strong>Презентизм:</strong> ${pmScores[2].toFixed(1)}</li><li><strong>Интертекстуальность:</strong> ${pmScores[3].toFixed(1)}</li></ul></div>`;
        if (warnings.length > 0) {
            resultHtml += `<div class="alert"><strong>Внимание!</strong> Признаки: ${warnings.join(", ")}. Рекомендуется консультация специалиста.</div>`;
        } else {
            resultHtml += `<div class="alert" style="background:#d4edda;border-left-color:#28a745;">По дополнительным вопросам не выявлено выраженных признаков клинических состояний.</div>`;
        }

        resultHtml += `
            <div class="action-buttons">
                <button id="restartBtn">Пройти заново</button>

            </div>
        </div>`;

        document.getElementById('test-root').innerHTML = resultHtml;
        document.getElementById('restartBtn').addEventListener('click', () => location.reload());

    renderCurrentPage();
</script>
